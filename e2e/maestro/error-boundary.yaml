# NEXA E2E: Error recovery
# Testa que o app nao crasha e se recupera de estados inesperados
appId: com.nexa
---
- launchApp:
    clearState: true

# Login rapido
- tapOn: "Entrar como convidado"
- waitForAnimationToEnd
- tapOn: "Pular"
- waitForAnimationToEnd

# Navegacao rapida entre todas as tabs (stress test)
- tapOn: "Apostas"
- tapOn: "Ranking"
- tapOn: "Perfil"
- tapOn: "Feed"
- tapOn: "Apostas"
- tapOn: "Ranking"
- waitForAnimationToEnd

# App ainda funciona
- assertVisible: "Ranking"

# Voltar pro feed
- tapOn: "Feed"
- assertVisible: "Para voce|Para você"

# Scroll rapido no feed (stress)
- scroll:
    direction: DOWN
    speed: 80
- scroll:
    direction: DOWN
    speed: 80
- scroll:
    direction: UP
    speed: 80

# App ainda responde
- assertVisible: "Feed"
