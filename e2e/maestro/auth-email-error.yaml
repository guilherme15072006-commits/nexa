# NEXA E2E: Login email — erro com campos vazios
# Testa que o app mostra erro quando email/senha estao vazios
appId: com.nexa
---
- launchApp:
    clearState: true

# Tela de login
- assertVisible: "Bem-vindo ao NEXA"

# Abrir form de email
- tapOn: "Entrar com email"
- waitForAnimationToEnd

# Campos devem aparecer
- assertVisible: "Email"
- assertVisible: "Senha"

# Tentar entrar sem preencher
- tapOn: "Entrar"
- waitForAnimationToEnd

# Deve mostrar erro
- assertVisible: "Preencha|erro|Erro"

# Tentar novamente deve estar visivel
- tapOn: "Tentar novamente"
- waitForAnimationToEnd

# Volta pro login
- assertVisible: "Entrar com email|Entrar com Google"
